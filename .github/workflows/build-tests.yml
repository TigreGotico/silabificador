name: Build Tests

on:
  pull_request:
    branches: [dev, master]
  workflow_dispatch:

jobs:
  build:
    uses: OpenVoiceOS/gh-automations/.github/workflows/build-tests.yml@dev
    with:
      python_versions: '["3.10", "3.11", "3.12", "3.13"]'
      install_extras: 'test'
      test_path: 'tests'
